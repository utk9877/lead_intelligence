services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-li}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-li_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-lead_intelligence}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-li} -d ${POSTGRES_DB:-lead_intelligence}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest  # pin to a RELEASE tag in chunk 2, when Docker is installed and the snapshot code exercises it
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-li_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-li_dev_password}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
